<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>TouchBoard</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32x32.png?v=1" />
  <link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon-16x16.png?v=1" />
  <link rel="icon" href="/static/img/favicon.ico?v=1" sizes="any" />
  <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png?v=1" />
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body class="display">
  <div class="board" id="board"></div>
  <div class="page-indicator" id="page-indicator" aria-hidden="true">
    <span class="pi-name" id="pi-name"></span>
    <div class="pi-dots" id="pi-dots"></div>
  </div>
  <div class="display-update-badge hidden" id="display-update-badge" aria-hidden="true">Update available</div>
  <script type="module" src="/static/js/display.js"></script>
</body>
</html>
