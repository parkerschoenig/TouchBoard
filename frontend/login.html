<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TouchBoard — Login</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32x32.png?v=1" />
  <link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon-16x16.png?v=1" />
  <link rel="icon" href="/static/img/favicon.ico?v=1" sizes="any" />
  <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png?v=1" />
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body class="login-page">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <img src="/static/img/logo.png?v=3" alt="TouchBoard" class="login-logo-img" />
        <span class="login-logo-name">TouchBoard</span>
      </div>
      <form id="login-form" autocomplete="on">
        <div class="login-field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" placeholder="admin" required />
        </div>
        <div class="login-field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
        </div>
        <div class="login-error" id="login-error"></div>
        <button class="login-btn" type="submit">Sign in</button>
      </form>
    </div>
  </div>
  <script type="module" src="/static/js/login.js"></script>
</body>
</html>
